# Pre-commit hooks — run before every git commit.
# Install once:    pip install pre-commit && pre-commit install
# Manual run:      pre-commit run --all-files
# Update hooks:    pre-commit autoupdate

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(md|sql)$
      - id: end-of-file-fixer
        exclude: \.(md|sql)$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        # format check (no auto-fix in pre-commit; run `ruff format .` manually)
        args: [--check]

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (changed-related tests only)
        entry: pytest -q --tb=short
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]

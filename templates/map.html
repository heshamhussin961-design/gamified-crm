<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06060f"/>
<title>AlSaeb — Neon City</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{neo:{bg:'#06060f',surface:'#0c0c1e',card:'#111130',cyan:'#00e5ff',blue:'#2979ff',purple:'#7c4dff',pink:'#ff1867',green:'#00e676',amber:'#ffab00',text:'#e2e8f0',muted:'#334155'}},fontFamily:{display:['Chakra Petch','IBM Plex Sans Arabic','sans-serif'],body:['IBM Plex Sans Arabic','Chakra Petch','sans-serif']}}}}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
:root{--cyan:#00e5ff;--blue:#2979ff;--purple:#7c4dff;--pink:#ff1867;--green:#00e676;--bg:#06060f}
body{font-family:'IBM Plex Sans Arabic','Chakra Petch',sans-serif;background:var(--bg);overflow-x:hidden;overscroll-behavior:none;margin:0}

/* ── HUD ── */
.hud{position:sticky;top:0;z-index:50;background:rgba(6,6,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,229,255,.08)}
.hud-inner{max-width:540px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:10px}

/* ── Stat pills ── */
.pill{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.12);border-radius:999px;padding:3px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap}

/* ── Map viewport ── */
.map-viewport{width:100%;max-width:540px;margin:0 auto;position:relative;overflow:hidden}

/* ── Neon flicker on signs ── */
@keyframes flicker{0%,100%{opacity:1}4%{opacity:.7}8%{opacity:1}42%{opacity:.85}44%{opacity:1}82%{opacity:.92}84%{opacity:1}}
.neon-flicker{animation:flicker 4s ease-in-out infinite}

/* ── Building window twinkle ── */
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

/* ── Car glow ── */
@keyframes car-glow{0%,100%{filter:drop-shadow(0 0 6px rgba(0,229,255,.7))}50%{filter:drop-shadow(0 0 14px rgba(0,229,255,1)) drop-shadow(0 0 28px rgba(0,229,255,.35))}}
#car-group{animation:car-glow 2s ease-in-out infinite}

/* ── Headlight beams ── */
@keyframes headlight{0%,100%{opacity:.25}50%{opacity:.5}}
.headlight-beam{animation:headlight 1.5s ease-in-out infinite}

/* ── Pulse on current milestone ── */
@keyframes m-pulse{0%,100%{r:8;opacity:.5}50%{r:16;opacity:0}}

/* ── Fog ── */
.fog-block{transition:opacity 1.2s ease-out}
.fog-block.cleared{opacity:0!important}

/* ── Tooltip ── */
.city-tooltip{position:fixed;z-index:60;background:rgba(12,12,30,.95);border:1px solid rgba(0,229,255,.25);border-radius:10px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:200px;box-shadow:0 0 24px rgba(0,229,255,.08)}
.city-tooltip.show{opacity:1}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:70;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-card{background:#0c0c1e;border-top:1px solid rgba(0,229,255,.15);border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:540px;box-shadow:0 -8px 40px rgba(0,229,255,.08)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,229,255,.12);border-radius:4px}

/* ── Mobile D-Pad ── */
[id="map-dpad"]{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:40;touch-action:none}
@media(pointer:coarse){[id="map-dpad"]{display:flex}}
.map-dpad-btn{width:56px;height:56px;border-radius:14px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:#00e5ff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:background .15s}
.map-dpad-btn:active{background:rgba(0,229,255,.3)}

/* ── Neon pulse for signs ── */
@keyframes neonPulse{0%,100%{text-shadow:0 0 4px currentColor,0 0 8px currentColor}50%{text-shadow:0 0 8px currentColor,0 0 16px currentColor,0 0 24px currentColor}}
/* ── Ambient ground glow ── */
@keyframes groundGlow{0%,100%{opacity:.03}50%{opacity:.07}}
/* ── Smoke drift ── */
@keyframes smokeDrift{0%{opacity:.06;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  #car-group,.neon-flicker{animation:none!important}
  .fog-block{transition:none!important}
}
</style>
</head>
<body class="bg-neo-bg text-neo-text min-h-screen">

<!-- ═══ HUD ═══ -->
<header class="hud">
  <div class="hud-inner">
    <a href="/agent" class="text-neo-cyan/60 hover:text-neo-cyan transition-colors cursor-pointer" style="display:flex;align-items:center;gap:2px">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="font-display font-bold text-xs tracking-widest text-neo-cyan flex-shrink-0" style="letter-spacing:3px">NEON CITY</h1>
    <div class="flex-1"></div>
    <div class="pill text-neo-cyan"><svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><polygon points="10,1 12.5,7.5 19.5,8 14,12.5 15.5,19.5 10,15.5 4.5,19.5 6,12.5 0.5,8 7.5,7.5"/></svg> Lv <span id="hud-lv">1</span></div>
    <div class="pill text-neo-green"><span id="hud-xp">0</span> XP</div>
    <div class="pill text-neo-purple"><span id="hud-coins">0</span> C</div>
    <div class="pill text-neo-pink" style="font-size:9px"><span id="hud-chapter">Ch.0</span></div>
  </div>
  <!-- XP bar -->
  <div style="max-width:540px;margin:0 auto;padding:0 16px 8px">
    <div style="height:3px;background:rgba(0,229,255,.08);border-radius:4px;overflow:hidden">
      <div id="xp-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#2979ff);border-radius:4px;transition:width .6s ease-out"></div>
    </div>
  </div>
</header>

<!-- ═══ MAP ═══ -->
<div class="map-viewport" id="map-viewport">
<svg id="city" viewBox="0 0 600 3200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">
<defs>
  <!-- Glow filters -->
  <filter id="gl-cyan" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feFlood flood-color="#00e5ff" flood-opacity=".5"/><feComposite in2="b" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gl-pink" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/><feFlood flood-color="#ff1867" flood-opacity=".4"/><feComposite in2="SourceGraphic" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gl-purple" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/><feFlood flood-color="#7c4dff" flood-opacity=".4"/><feComposite in2="SourceGraphic" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gl-green" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/><feFlood flood-color="#00e676" flood-opacity=".4"/><feComposite in2="SourceGraphic" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gl-blue" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="4"/><feFlood flood-color="#2979ff" flood-opacity=".4"/><feComposite in2="SourceGraphic" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gl-amber" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/><feFlood flood-color="#ffab00" flood-opacity=".4"/><feComposite in2="SourceGraphic" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <!-- Street glow -->
  <filter id="street-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/><feFlood flood-color="#00e5ff" flood-opacity=".18"/><feComposite in2="b" operator="in" result="s"/><feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <!-- Road pattern -->
  <pattern id="road-dash" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(0)">
    <rect width="20" height="20" fill="none"/>
    <line x1="10" y1="0" x2="10" y2="8" stroke="#ffab00" stroke-width="1" opacity=".25"/>
  </pattern>
  <!-- Sky gradient (extended for 3200) -->
  <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0820"/>
    <stop offset="30%" stop-color="#06060f"/>
    <stop offset="100%" stop-color="#06060f"/>
  </linearGradient>
  <!-- Zone background gradients -->
  <linearGradient id="z-grad-0" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a2530"/>
    <stop offset="100%" stop-color="#061520"/>
  </linearGradient>
  <linearGradient id="z-grad-1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a0e35"/>
    <stop offset="100%" stop-color="#0e0828"/>
  </linearGradient>
  <linearGradient id="z-grad-2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#350a28"/>
    <stop offset="100%" stop-color="#200818"/>
  </linearGradient>
  <linearGradient id="z-grad-3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a3520"/>
    <stop offset="100%" stop-color="#082518"/>
  </linearGradient>
  <linearGradient id="z-grad-4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#352a08"/>
    <stop offset="100%" stop-color="#251c06"/>
  </linearGradient>
  <!-- Zone clip paths -->
  <clipPath id="clip-z0"><rect x="0" y="2680" width="600" height="520"/></clipPath>
  <clipPath id="clip-z1"><rect x="0" y="2080" width="600" height="520"/></clipPath>
  <clipPath id="clip-z2"><rect x="0" y="1480" width="600" height="520"/></clipPath>
  <clipPath id="clip-z3"><rect x="0" y="720" width="600" height="680"/></clipPath>
  <clipPath id="clip-z4"><rect x="0" y="40" width="600" height="600"/></clipPath>
</defs>

<!-- Sky background -->
<rect width="600" height="3200" fill="url(#sky-grad)"/>

<!-- Zone background tint rects -->
<rect x="0" y="2680" width="600" height="520" fill="url(#z-grad-0)"/>
<rect x="0" y="2080" width="600" height="520" fill="url(#z-grad-1)"/>
<rect x="0" y="1480" width="600" height="520" fill="url(#z-grad-2)"/>
<rect x="0" y="720" width="600" height="680" fill="url(#z-grad-3)"/>
<rect x="0" y="40" width="600" height="600" fill="url(#z-grad-4)"/>

<!-- ═══════════════════════════════════════════════════════════
     CITY BACKGROUND — zone-specific procedural elements
     ═══════════════════════════════════════════════════════════ -->
<g id="bg-city"></g>

<!-- ═══════════════════════════════════════════════════════════
     ZONE TRANSITIONS
     ═══════════════════════════════════════════════════════════ -->
<g id="transitions"></g>

<!-- ═══════════════════════════════════════════════════════════
     THE MAIN ROAD
     ═══════════════════════════════════════════════════════════ -->
<!-- Road surface (wide) -->
<path id="road-surface" d="" stroke="#12123a" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
<!-- Road outer glow — always visible -->
<path id="road-outer-glow" d="" stroke="#00e5ff" stroke-width="62" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".06"/>
<!-- Road inner ambient glow -->
<path id="road-inner-glow" d="" stroke="#00e5ff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".03"/>
<!-- Road edge lines — brighter -->
<path id="road-edge-L" d="" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".45" stroke-dasharray="8 12"/>
<path id="road-edge-R" d="" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".45" stroke-dasharray="8 12"/>
<!-- Road center dashes -->
<path id="road-center" d="" stroke="#ffab00" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".35" stroke-dasharray="10 14"/>
<!-- Zone-colored road glow paths (revealed portion) — brighter -->
<path id="road-glow-z0" d="" stroke="#00e5ff" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#street-glow)" opacity=".7" clip-path="url(#clip-z0)" stroke-dasharray="6000" stroke-dashoffset="6000"/>
<path id="road-glow-z1" d="" stroke="#7c4dff" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#street-glow)" opacity=".7" clip-path="url(#clip-z1)" stroke-dasharray="6000" stroke-dashoffset="6000"/>
<path id="road-glow-z2" d="" stroke="#ff1867" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#street-glow)" opacity=".8" clip-path="url(#clip-z2)" stroke-dasharray="6000" stroke-dashoffset="6000"/>
<path id="road-glow-z3" d="" stroke="#00e676" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#street-glow)" opacity=".7" clip-path="url(#clip-z3)" stroke-dasharray="6000" stroke-dashoffset="6000"/>
<path id="road-glow-z4" d="" stroke="#ffab00" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#street-glow)" opacity=".9" clip-path="url(#clip-z4)" stroke-dasharray="6000" stroke-dashoffset="6000"/>

<!-- ═══════════════════════════════════════════════════════════
     LANDMARK BUILDINGS (placed at milestones)
     ═══════════════════════════════════════════════════════════ -->
<g id="landmarks"></g>

<!-- ═══════════════════════════════════════════════════════════
     MILESTONE MARKERS on the road
     ═══════════════════════════════════════════════════════════ -->
<g id="milestones"></g>

<!-- ═══════════════════════════════════════════════════════════
     FOG OF WAR
     ═══════════════════════════════════════════════════════════ -->
<g id="fog-layer"></g>

<!-- ═══════════════════════════════════════════════════════════
     THE CAR
     ═══════════════════════════════════════════════════════════ -->
<polyline id="car-trail" points="" fill="none" stroke="#00e5ff" stroke-width="2" opacity=".15" stroke-linecap="round"/>
<g id="car-group" transform="translate(300,3050)">
  <!-- Headlight beams -->
  <polygon class="headlight-beam" points="-4,-18 -8,-40 0,-42" fill="#00e5ff" opacity=".25"/>
  <polygon class="headlight-beam" points="4,-18 8,-40 0,-42" fill="#00e5ff" opacity=".25"/>
  <!-- Car shadow -->
  <ellipse cx="0" cy="2" rx="11" ry="5" fill="#000" opacity=".4"/>
  <!-- Car body -->
  <rect x="-9" y="-20" width="18" height="36" rx="5" fill="#0c0c1e" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- Windshield -->
  <rect x="-6" y="-16" width="12" height="8" rx="2" fill="#0a1628" stroke="#2979ff" stroke-width=".7" opacity=".8"/>
  <!-- Roof detail -->
  <rect x="-4" y="-6" width="8" height="6" rx="1.5" fill="#111130"/>
  <!-- Rear window -->
  <rect x="-5" y="4" width="10" height="5" rx="1.5" fill="#0a1628" stroke="#7c4dff" stroke-width=".5" opacity=".6"/>
  <!-- Taillights -->
  <rect x="-8" y="12" width="4" height="2" rx="1" fill="#ff1867" filter="url(#gl-pink)"/>
  <rect x="4"  y="12" width="4" height="2" rx="1" fill="#ff1867" filter="url(#gl-pink)"/>
  <!-- Headlights -->
  <rect x="-7" y="-19" width="3" height="2" rx="1" fill="#00e5ff" filter="url(#gl-cyan)"/>
  <rect x="4"  y="-19" width="3" height="2" rx="1" fill="#00e5ff" filter="url(#gl-cyan)"/>
  <!-- Side neon strips -->
  <line x1="-9" y1="-8" x2="-9" y2="8" stroke="#00e5ff" stroke-width="1" opacity=".5"/>
  <line x1="9"  y1="-8" x2="9"  y2="8" stroke="#00e5ff" stroke-width="1" opacity=".5"/>
</g>

</svg>
</div>

<!-- ═══ TOOLTIP ═══ -->
<div id="tooltip" class="city-tooltip">
  <div id="tt-name" class="font-display font-bold text-xs text-neo-cyan"></div>
  <div id="tt-desc" class="text-[10px] text-slate-400 mt-1"></div>
  <div id="tt-xp" class="text-[10px] text-neo-cyan/50 mt-1 font-display"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 id="m-title" class="font-display font-bold text-neo-cyan"></h3>
      <button onclick="closeModal()" class="text-slate-600 hover:text-neo-cyan transition-colors cursor-pointer"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div id="m-chapter" class="font-display text-[10px] tracking-[3px] text-slate-500" style="text-align:center;margin-bottom:4px"></div>
    <div id="m-icon" style="text-align:center;font-size:40px;margin-bottom:8px"></div>
    <p id="m-desc" class="text-sm text-slate-400" style="text-align:center;margin-bottom:8px"></p>
    <div id="m-story" class="text-xs text-slate-500" style="text-align:center;margin-bottom:12px;line-height:1.7;font-style:italic;padding:0 8px;border-right:2px solid rgba(0,229,255,.15);direction:rtl"></div>
    <div style="display:flex;justify-content:center;gap:16px">
      <div style="background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.12);border-radius:10px;padding:8px 18px;text-align:center"><div class="text-[10px] text-neo-cyan/50 font-display">XP NEEDED</div><div id="m-xp" class="font-display font-bold text-neo-cyan"></div></div>
      <div style="background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.12);border-radius:10px;padding:8px 18px;text-align:center"><div class="text-[10px] text-neo-purple/50 font-display">REWARD</div><div id="m-reward" class="font-display font-bold text-neo-purple text-sm"></div></div>
    </div>
    <div id="m-status" class="font-display text-xs" style="text-align:center;margin-top:10px"></div>
  </div>
</div>

<!-- MOBILE TAP (milestone info only) -->
<div id="map-dpad">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="map-dpad-btn" style="width:160px;font-size:13px;font-weight:700;font-family:'Chakra Petch';letter-spacing:1px;border-radius:14px" onclick="mapDpadInteract()">📍 تفاصيل المرحلة</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  DATA — MILESTONES (EXACT SAME)
// ════════════════════════════════════════════════════════════
const MS = [
  { id:0,  title:'بداية الرحلة',     bld:'Starter Garage',     icon:'🚀', desc:'مرآب البداية — رحلتك تبدأ هنا',                xp:0,     reward:'—',            color:'#00e5ff',  ch:'Chapter 0: The Rookie', story:'وصلت المدينة لأول مرة. مرآب صغير، حلم كبير. كل أسطورة بدأت من هنا — خطوتك الأولى في عالم الصفقات.' },
  { id:1,  title:'أول رسالة',        bld:'Chat Tower',         icon:'💬', desc:'برج الرسائل — ابعت أول رسالة',                 xp:100,   reward:'+50 C',        color:'#00e5ff',  ch:'Chapter 1: First Contact', story:'صعدت برج الرسائل وبعت أول رسالة. الشاشات حواليك بتنور — العملاء بدأوا يسمعوك.' },
  { id:2,  title:'المتصل',           bld:'Signal Station',     icon:'📞', desc:'محطة الإشارة — ٥ مكالمات',                     xp:300,   reward:'+100 C',       color:'#2979ff',  ch:'Chapter 2: The Caller', story:'محطة الإشارة اتفتحت ليك. ٥ مكالمات — صوتك بقى معروف في المدينة. الأنتينات بتبعت إشاراتك لكل مكان.' },

//  SVG HELPERS
// ════════════════════════════════════════════════════════════
const SVG_NS = 'http://www.w3.org/2000/svg';
function S(tag, attrs={}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

// Build a smooth SVG path from waypoints using Catmull-Rom → cubic bezier
function waypointsToPath(pts) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1, 0)];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[Math.min(i+2, pts.length-1)];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

// Offset a path left/right by shifting control-point normals (approximation)
function offsetWaypoints(pts, offset) {
  return pts.map((p, i) => {
    const prev = pts[Math.max(i-1,0)];
    const next = pts[Math.min(i+1,pts.length-1)];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    return { x: p.x + (-dy/len)*offset, y: p.y + (dx/len)*offset };
  });
}

function buildCity() {
  const svg = document.getElementById('city');

  // ── Draw road ──
  const roadD = waypointsToPath(ROAD);
  document.getElementById('road-outer-glow').setAttribute('d', roadD);
  document.getElementById('road-inner-glow').setAttribute('d', roadD);
  document.getElementById('road-surface').setAttribute('d', roadD);
  document.getElementById('road-center').setAttribute('d', roadD);
  document.getElementById('road-edge-L').setAttribute('d', waypointsToPath(offsetWaypoints(ROAD, 24)));
  document.getElementById('road-edge-R').setAttribute('d', waypointsToPath(offsetWaypoints(ROAD, -24)));

  // Set road path on all 5 zone glow paths
  for (let z = 0; z < 5; z++) {
    document.getElementById('road-glow-z'+z).setAttribute('d', roadD);
  }

  // Use road-surface as the reference path for car positioning
  pathEl = document.getElementById('road-surface');
  pathLen = pathEl.getTotalLength();

  // Set dasharray/offset on all zone glow paths
  for (let z = 0; z < 5; z++) {
    const gp = document.getElementById('road-glow-z'+z);
    gp.style.strokeDasharray = pathLen;
    gp.style.strokeDashoffset = pathLen;
  }

  // ── Zone-specific backgrounds ──
  ZONES.forEach(z => generateZoneBG(z));

  // ── Zone transitions ──
  for (let i = 0; i < 4; i++) drawTransition(i);

  // ── Stars (zones 2-4 only, denser toward 4) — bright! ──

    bgCity.appendChild(star);
  }

  // ── Street lamps (zones 0-1 only) ──
  for (let i = 2; i < 18; i += 3) {

    const next = ROAD[Math.min(i+1,ROAD.length-1)];
    const dx = next.x - prev.x, dy = next.y - prev.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const side = (i%2===0) ? 1 : -1;
    const lx = p.x + (-dy/len)*32*side;
    const ly = p.y + (dx/len)*32*side;

    const pos = ROAD[ridx];
    const prev = ROAD[Math.max(ridx-1,0)];
    const next = ROAD[Math.min(ridx+1,ROAD.length-1)];
    const dx = next.x - prev.x, dy = next.y - prev.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const side = (i % 2 === 0) ? 1 : -1;
    const offDist = 65 + Math.random()*20;
    const bx = pos.x + (-dy/len)*offDist*side;

    const bLeft = bx - bw/2;
    const bTop = by - bh/2;
    const filt = {'#00e5ff':'url(#gl-cyan)','#2979ff':'url(#gl-blue)','#7c4dff':'url(#gl-purple)','#ff1867':'url(#gl-pink)','#00e676':'url(#gl-green)','#ffab00':'url(#gl-amber)'}[m.color]||'url(#gl-cyan)';

    const g = S('g', {'data-ms':i, class:'cursor-pointer', style:'pointer-events:all'});

    // Draw unique building shape
    drawLandmark(g, i, bx, by, bw, bh, bLeft, bTop, m.color, filt);

    // Ground glow beneath building — visible
    g.appendChild(S('ellipse', {cx:bx, cy:bTop+bh+3, rx:bw*.55, ry:8, fill:m.color, opacity:'.08'}));
    g.appendChild(S('ellipse', {cx:bx, cy:bTop+bh+3, rx:bw*.35, ry:4, fill:m.color, opacity:'.12'}));

    // Neon sign (building name) — bright
    const signY = bTop - (i===19?38:i===10?28:i%5===0?24:10);
    const sign = S('text', {x:bx, y:signY, 'text-anchor':'middle', 'font-size':(i===19?'12':i===10?'10.5':'8'), fill:m.color, 'font-family':'Chakra Petch,sans-serif', 'font-weight':'700', filter:filt, class:'neon-flicker', opacity:'.9'});
    sign.textContent = m.bld;
    g.appendChild(sign);
    // Sign glow halo
    const signW = m.bld.length * (i===19?7:i===10?6:4.5);
    g.appendChild(S('rect', {x:bx-signW/2-4, y:signY-10, width:signW+8, height:14, rx:3, fill:m.color, opacity:'.04'}));

    g.addEventListener('click', () => showModal(i));
    landmarksG.appendChild(g);

    // ── Road milestone marker ──
    const mg = S('g', {'data-marker':i});
    mg.appendChild(S('circle', {cx:pos.x, cy:pos.y, r:16, fill:'none', stroke:m.color, 'stroke-width':1.2, opacity:'.35'}));
    mg.appendChild(S('circle', {cx:pos.x, cy:pos.y, r:10, fill:'#0c0c28', stroke:m.color, 'stroke-width':2}));
    const numT = S('text', {x:pos.x, y:pos.y+4, 'text-anchor':'middle', 'font-size':'8', fill:m.color, 'font-family':'Chakra Petch', 'font-weight':'700'});
    numT.textContent = i;
    mg.appendChild(numT);
    mg.addEventListener('click', () => showModal(i));
    milestonesG.appendChild(mg);
  });

  // ── Fog of war ──
  buildFog();
}

// ════════════════════════════════════════════════════════════
//  ZONE BACKGROUND GENERATION
// ════════════════════════════════════════════════════════════
function generateZoneBG(zone) {
  const bgCity = document.getElementById('bg-city');
  const {yTop, yBot, accent, accent2, bgStyle} = zone;
  const h = yBot - yTop;

  switch(bgStyle) {
    case 'industrial': {
      // Pipes (horizontal + vertical lines)
      for(let i=0;i<10;i++){
        const py = yTop + 30 + Math.random()*(h-60);
        const px = Math.random() > 0.5 ? 5+Math.random()*80 : 500+Math.random()*80;
        const pw = 40+Math.random()*80;
        bgCity.appendChild(S('line', {x1:px, y1:py, x2:px+pw, y2:py, stroke:accent2, 'stroke-width':(1.5+Math.random()*2.5).toFixed(1), opacity:'.25'}));
      }
      for(let i=0;i<6;i++){
        const px = Math.random() > 0.5 ? 15+Math.random()*60 : 520+Math.random()*60;
        const py = yTop + 20 + Math.random()*(h-100);
        bgCity.appendChild(S('line', {x1:px, y1:py, x2:px, y2:py+50+Math.random()*80, stroke:accent2, 'stroke-width':(1.5+Math.random()*2).toFixed(1), opacity:'.2'}));
      }
      // Concrete pillars
      for(let i=0;i<8;i++){
        const px = Math.random() > 0.5 ? 8+Math.random()*70 : 510+Math.random()*70;
        const py = yTop + 40 + Math.random()*(h-80);
        const pw = 14+Math.random()*14, ph = 40+Math.random()*60;
        bgCity.appendChild(S('rect', {x:px, y:py, width:pw, height:ph, rx:1, fill:'#0c0c22', stroke:'#1a1a40', 'stroke-width':'1'}));
        // Pillar window lights
        for(let w2=0;w2<3;w2++){bgCity.appendChild(S('rect',{x:px+3,y:py+6+w2*14,width:pw-6,height:4,rx:.5,fill:accent,opacity:(.06+Math.random()*.1).toFixed(2)}));}
      }
      // Amber bulbs with glow
      for(let i=0;i<8;i++){
        const bx = 20+Math.random()*560;
        const by = yTop + 20 + Math.random()*(h-40);
        bgCity.appendChild(S('circle', {cx:bx, cy:by, r:2.5, fill:'#ffab00', opacity:(.15+Math.random()*.15).toFixed(2)}));
        bgCity.appendChild(S('circle', {cx:bx, cy:by, r:8, fill:'#ffab00', opacity:'.04'}));
      }
      break;
    }
    case 'street': {
      // Medium buildings on margins
      const sides = [{base:5, range:80},{base:495, range:80}];
      sides.forEach(s => {
        for(let i=0;i<6;i++){
          const bx = s.base + Math.random()*s.range;
          const by = yTop + 15 + i*(h/6);
          const bw = 30+Math.random()*35;
          const bh = 45+Math.random()*65;
          const g = S('g');
          g.appendChild(S('rect', {x:bx, y:by, width:bw, height:bh, rx:1.5, fill:'#0c0c22', stroke:accent, 'stroke-width':'1', opacity:'.7'}));
          // Roof neon line
          g.appendChild(S('line', {x1:bx, y1:by, x2:bx+bw, y2:by, stroke:accent, 'stroke-width':(1.2+Math.random()*1.5).toFixed(1), opacity:(.3+Math.random()*.25).toFixed(2)}));
          // Windows — brighter
          const cols = Math.floor(bw/9), rows = Math.floor(bh/11);
          for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
            if(Math.random()>.3){
              const wColor = Math.random()>.7 ? accent2 : accent;
              const win = S('rect', {x:bx+3+c*9, y:by+4+r*11, width:4.5, height:5.5, rx:.4, fill:wColor, opacity:(.12+Math.random()*.25).toFixed(2)});
              win.style.animation=`twinkle ${3+Math.random()*5}s ease-in-out ${Math.random()*4}s infinite`;
              g.appendChild(win);
            }
          }
          bgCity.appendChild(g);
        }
      });
      // Neon signs — bigger and brighter
      const signTexts = ['BAR','CYBER','RAMEN','NEON','CLUB','24/7','VR','DATA','HOTEL','JAZZ'];
      for(let i=0;i<10;i++){
        const sx = Math.random()>0.5 ? 8+Math.random()*80 : 500+Math.random()*80;
        const sy = yTop + 30 + Math.random()*(h-60);
        const sColor = [accent, accent2, '#00e5ff','#ff1867','#ffab00'][Math.floor(Math.random()*5)];
        const txt = signTexts[Math.floor(Math.random()*signTexts.length)];
        const sW = txt.length*6+8;
        const sg = S('g');
        sg.appendChild(S('rect', {x:sx, y:sy-9, width:sW, height:14, rx:2, fill:'#08081a', stroke:sColor, 'stroke-width':'1', opacity:'.7'}));
        const st = S('text', {x:sx+sW/2, y:sy+2, 'text-anchor':'middle', 'font-size':'6.5', fill:sColor, 'font-family':'Chakra Petch', 'font-weight':'700', opacity:'.85', class:'neon-flicker'});
        st.textContent = txt;
        sg.appendChild(st);
        // Neon glow halo
        sg.appendChild(S('rect', {x:sx-2, y:sy-11, width:sW+4, height:18, rx:3, fill:sColor, opacity:'.04'}));
        bgCity.appendChild(sg);
      }
      break;
    }
    case 'monument': {
      // Energy lines radiating from center — brighter
      for(let i=0;i<12;i++){
        const angle = (i/12)*Math.PI*2;
        const r1 = 30, r2 = 140+Math.random()*100;
        const cx2 = 300+Math.cos(angle)*r1, cy2 = yTop+h/2+Math.sin(angle)*r1;
        const ex = 300+Math.cos(angle)*r2, ey = yTop+h/2+Math.sin(angle)*r2;
        bgCity.appendChild(S('line', {x1:cx2, y1:cy2, x2:ex, y2:ey, stroke:accent, 'stroke-width':'1', opacity:(.12+Math.random()*.12).toFixed(2)}));
      }
      // Concentric energy rings
      for(let r=1;r<=4;r++){
        bgCity.appendChild(S('circle', {cx:300, cy:yTop+h/2, r:r*50, fill:'none', stroke:accent, 'stroke-width':'.6', opacity:(.06+r*.02).toFixed(2)}));
      }
      // Floating geometric shapes — larger and brighter
      for(let i=0;i<12;i++){
        const gx = 40+Math.random()*520;
        const gy = yTop+25+Math.random()*(h-50);
        const sz = 6+Math.random()*10;
        if(Math.random()>0.5){
          bgCity.appendChild(S('path', {d:`M${gx},${gy-sz} L${gx+sz},${gy} L${gx},${gy+sz} L${gx-sz},${gy} Z`, fill:'none', stroke:accent, 'stroke-width':'1', opacity:(.15+Math.random()*.15).toFixed(2)}));
        } else {
          bgCity.appendChild(S('polygon', {points:`${gx},${gy-sz} ${gx+sz*.87},${gy+sz*.5} ${gx-sz*.87},${gy+sz*.5}`, fill:'none', stroke:accent2, 'stroke-width':'1', opacity:(.12+Math.random()*.15).toFixed(2)}));
        }
      }
      // Pulsing center glow
      bgCity.appendChild(S('circle', {cx:300, cy:yTop+h/2, r:25, fill:accent, opacity:'.06'}));
      break;
    }
    case 'elevated': {
      // Tall glass towers on margins — brighter
      const towerSides = [{base:5, range:70},{base:515, range:70}];
      towerSides.forEach(s => {
        for(let i=0;i<5;i++){
          const tx = s.base + Math.random()*s.range;
          const ty = yTop + 15 + i*(h/5);
          const tw = 22+Math.random()*28;
          const th = 80+Math.random()*100;
          const g2 = S('g');
          g2.appendChild(S('rect', {x:tx, y:ty, width:tw, height:th, rx:2, fill:'#0a0a22', stroke:accent, 'stroke-width':'1.2', opacity:'.8'}));
          // Glass reflection lines
          for(let r=0;r<5;r++){
            g2.appendChild(S('line', {x1:tx+2, y1:ty+6+r*(th/5), x2:tx+tw-2, y2:ty+6+r*(th/5), stroke:accent, 'stroke-width':'.5', opacity:'.2'}));
          }
          // Windows
          const cols = Math.floor(tw/8), rows = Math.floor(th/10);
          for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
            if(Math.random()>.4) g2.appendChild(S('rect',{x:tx+3+c*8,y:ty+4+r*10,width:3.5,height:4,rx:.3,fill:accent,opacity:(.08+Math.random()*.18).toFixed(2)}));
          }
          // Roof beacon
          g2.appendChild(S('circle', {cx:tx+tw/2, cy:ty-2, r:1.5, fill:accent, opacity:'.4'}));
          bgCity.appendChild(g2);
        }
      });
      // Sky bridges between towers — visible
      for(let i=0;i<4;i++){
        const by2 = yTop + 40 + i*(h/4) + Math.random()*30;
        bgCity.appendChild(S('line', {x1:55+Math.random()*20, y1:by2, x2:530+Math.random()*20, y2:by2+Math.random()*10-5, stroke:accent2, 'stroke-width':'1.2', opacity:'.12'}));
        // Bridge lights
        for(let bl=0;bl<3;bl++){
          bgCity.appendChild(S('circle',{cx:150+bl*150,cy:by2,r:1.2,fill:accent2,opacity:'.2'}));
        }
      }
      // Diamond accents — brighter
      for(let i=0;i<8;i++){
        const dx2=40+Math.random()*520, dy2=yTop+30+Math.random()*(h-60);
        const dsz=4+Math.random()*4;
        bgCity.appendChild(S('path', {d:`M${dx2},${dy2-dsz} L${dx2+dsz},${dy2} L${dx2},${dy2+dsz} L${dx2-dsz},${dy2} Z`, fill:'none', stroke:accent2, 'stroke-width':'.8', opacity:(.1+Math.random()*.1).toFixed(2)}));
      }
      break;
    }
    case 'celestial': {
      // Dense bright stars
      for(let i=0;i<60;i++){
        const sx2 = Math.random()*600, sy2 = yTop+Math.random()*h;
        const sr = (Math.random()*1.2+.3).toFixed(1);
        bgCity.appendChild(S('circle', {cx:sx2.toFixed(0), cy:sy2.toFixed(0), r:sr, fill:'#fff', opacity:(Math.random()*.4+.1).toFixed(2)}));
        // Star cross glow on bigger stars
        if(parseFloat(sr) > 1){
          bgCity.appendChild(S('line',{x1:sx2-3,y1:sy2,x2:sx2+3,y2:sy2,stroke:'#fff','stroke-width':'.3',opacity:'.15'}));
          bgCity.appendChild(S('line',{x1:sx2,y1:sy2-3,x2:sx2,y2:sy2+3,stroke:'#fff','stroke-width':'.3',opacity:'.15'}));
        }
      }
      // Golden sparkle circles — bigger and brighter
      for(let i=0;i<15;i++){
        const gx2=30+Math.random()*540, gy2=yTop+15+Math.random()*(h-30);
        const gr = (1.5+Math.random()*3).toFixed(1);
        bgCity.appendChild(S('circle', {cx:gx2, cy:gy2, r:gr, fill:accent, opacity:(.1+Math.random()*.15).toFixed(2)}));
        bgCity.appendChild(S('circle', {cx:gx2, cy:gy2, r:parseFloat(gr)*3, fill:accent, opacity:'.03'}));
      }
      // Cloud layers at bottom — visible
      for(let i=0;i<8;i++){
        const cx2 = 30+Math.random()*540, cy2 = yBot - 10 - Math.random()*80;
        bgCity.appendChild(S('ellipse', {cx:cx2, cy:cy2, rx:50+Math.random()*80, ry:8+Math.random()*10, fill:'#ffffff', opacity:(.03+Math.random()*.04).toFixed(3)}));
      }
      // Constellation lines
      for(let i=0;i<4;i++){
        const x1=80+Math.random()*440, y1=yTop+30+Math.random()*(h-60);
        const x2=x1+30+Math.random()*60, y2=y1-20+Math.random()*40;
        bgCity.appendChild(S('line',{x1,y1,x2,y2,stroke:accent,'stroke-width':'.4',opacity:'.08'}));
      }
      break;
    }
  }
}

// ════════════════════════════════════════════════════════════
//  FOG OF WAR — zone-based (5 rects)
// ════════════════════════════════════════════════════════════
function buildFog() {
  const fogLayer = document.getElementById('fog-layer');
  fogLayer.innerHTML = '';
  ZONES.forEach((z, i) => {
    const fog = S('rect', {x:0, y:z.yTop, width:600, height:z.yBot-z.yTop, fill:'#06060f', 'data-fog-idx':i, class:'fog-block'});
    const firstCh = z.chapters[0];
    if (currentNode >= firstCh) {
      fog.setAttribute('opacity', '0');
      fog.classList.add('cleared');
    } else if (i > 0 && currentNode >= ZONES[i-1].chapters[0]) {
      fog.setAttribute('opacity', '0.45');
    } else {
      fog.setAttribute('opacity', '0.88');
    }
    fogLayer.appendChild(fog);
  });
}

// ════════════════════════════════════════════════════════════
//  CLEAR FOG — zone-based
// ════════════════════════════════════════════════════════════
function clearFog() {
  ZONES.forEach((z, i) => {
    const fog = document.querySelector(`[data-fog-idx="${i}"]`);
    if (!fog) return;
    const firstCh = z.chapters[0];
    if (currentNode >= firstCh) {
      if (!fog.classList.contains('cleared')) {
        setTimeout(() => { fog.classList.add('cleared'); }, i * 200);
      }
    } else if (i > 0 && currentNode >= ZONES[i-1].chapters[0]) {
      fog.setAttribute('opacity', '0.45');
    } else {
      fog.setAttribute('opacity', '0.88');
    }
  });
}

// ════════════════════════════════════════════════════════════
//  REVEAL PATH (neon road glow — 5 zone-colored paths)
// ════════════════════════════════════════════════════════════
function revealRoad() {
  const progress = currentNode / (MS.length - 1);
  const offset = pathLen * (1 - progress);
  for (let z = 0; z < 5; z++) {
    const gp = document.getElementById('road-glow-z'+z);
    gp.style.transition = 'stroke-dashoffset 1.2s ease-out';
    gp.style.strokeDashoffset = offset;
  }
}

// ════════════════════════════════════════════════════════════
//  MOVE THE CAR
// ════════════════════════════════════════════════════════════
let carAnimFrame = null;

function positionCar(nodeIdx, animate) {
  const ridx = Math.min(MS_ROAD_IDX[nodeIdx], ROAD.length-1);
  // Get point on path corresponding to this road index
  const frac = ridx / (ROAD.length - 1);
  const targetLen = frac * pathLen;
  const pt = pathEl.getPointAtLength(targetLen);

  // Get tangent for rotation
  const pt2 = pathEl.getPointAtLength(Math.min(targetLen + 2, pathLen));
  const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * (180/Math.PI) + 90;

  const car = document.getElementById('car-group');

  if (animate) {
    // Animate car along path from current position
    const currentTransform = car.getAttribute('transform');
    const match = currentTransform.match(/translate\(([\d.]+),([\d.]+)\)/);
    let startLen = 0;
    if (match) {
      const cx = parseFloat(match[1]), cy = parseFloat(match[2]);
      startLen = findClosestLength(cx, cy);
    }

    cancelAnimationFrame(carAnimFrame);
    const duration = 1200 + Math.abs(targetLen - startLen) * 0.8;
    const startTime = performance.now();

    function step(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      const currentLen = startLen + (targetLen - startLen) * eased;
      const p = pathEl.getPointAtLength(Math.max(0, Math.min(currentLen, pathLen)));
      const p2 = pathEl.getPointAtLength(Math.min(currentLen + 2, pathLen));
      const a = Math.atan2(p2.y - p.y, p2.x - p.x) * (180/Math.PI) + 90;
      car.setAttribute('transform', `translate(${p.x},${p.y}) rotate(${a})`);
      if (t < 1) carAnimFrame = requestAnimationFrame(step);
    }
    carAnimFrame = requestAnimationFrame(step);
  } else {
    car.setAttribute('transform', `translate(${pt.x},${pt.y}) rotate(${angle})`);
  }
}

function findClosestLength(cx, cy) {
  let best = 0, bestDist = Infinity;
  for (let l = 0; l <= pathLen; l += 20) {
    const p = pathEl.getPointAtLength(l);
    const d = (p.x-cx)**2 + (p.y-cy)**2;
    if (d < bestDist) { bestDist = d; best = l; }
  }
  // Refine
  for (let l = Math.max(0, best-20); l <= Math.min(pathLen, best+20); l += 2) {
    const p = pathEl.getPointAtLength(l);
    const d = (p.x-cx)**2 + (p.y-cy)**2;
    if (d < bestDist) { bestDist = d; best = l; }
  }
  return best;
}

// ════════════════════════════════════════════════════════════
//  SCROLL TO CAR
// ════════════════════════════════════════════════════════════
function scrollToCar() {
  const svg = document.getElementById('city');
  const car = document.getElementById('car-group');
  const t = car.getAttribute('transform');
  const m = t.match(/translate\(([\d.]+),([\d.]+)\)/);
  if (!m) return;
  const cy = parseFloat(m[2]);
  const svgRect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const scale = svgRect.height / vb.height;
  const screenY = svgRect.top + window.scrollY + cy * scale;
  window.scrollTo({ top: Math.max(0, screenY - window.innerHeight * 0.5), behavior: 'smooth' });
}

// ════════════════════════════════════════════════════════════
//  UPDATE MILESTONE VISUALS
// ════════════════════════════════════════════════════════════
function updateMilestoneVisuals() {
  MS.forEach((m, i) => {
    const marker = document.querySelector(`[data-marker="${i}"]`);
    const landmark = document.querySelector(`[data-ms="${i}"]`);
    if (!marker) return;

    const unlocked = playerXP >= m.xp;
    const isCurrent = i === currentNode;

    // Marker glow
    const circles = marker.querySelectorAll('circle');
    const text = marker.querySelector('text');
    if (unlocked) {
      circles.forEach(c => { c.setAttribute('stroke', m.color); c.setAttribute('opacity', isCurrent ? '1' : '.6'); });
      if (isCurrent) {
        // Add pulse
        let pulse = marker.querySelector('.ms-pulse');
        if (!pulse) {
          pulse = S('circle', {cx:ROAD[MS_ROAD_IDX[i]].x, cy:ROAD[MS_ROAD_IDX[i]].y, r:8, fill:'none', stroke:m.color, 'stroke-width':2, opacity:'.5', class:'ms-pulse'});
          pulse.style.animation = 'm-pulse 2s ease-out infinite';
          marker.insertBefore(pulse, marker.firstChild);
        }
      }
      if (text) { text.setAttribute('fill', m.color); text.setAttribute('opacity', '1'); }
    } else {
      circles.forEach(c => { c.setAttribute('stroke', '#1e293b'); c.setAttribute('opacity', '.3'); });
      if (circles[1]) circles[1].setAttribute('fill', '#06060f');
      if (text) { text.setAttribute('fill', '#334155'); text.setAttribute('opacity', '.3'); }
    }

    // Landmark brightness
    if (landmark) {
      landmark.style.opacity = unlocked ? '1' : '.35';
      landmark.style.filter = unlocked ? 'none' : 'grayscale(1) brightness(0.4)';
      landmark.style.transition = 'opacity .6s, filter .6s';
    }
  });
}

// ════════════════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('hud-lv').textContent = playerLevel;
  document.getElementById('hud-xp').textContent = playerXP.toLocaleString();
  document.getElementById('hud-coins').textContent = playerCoins.toLocaleString();
  document.getElementById('hud-chapter').textContent = 'Ch.' + currentNode;
  const lvlXP = (playerLevel - 1) * 1000;
  const pct = Math.min(100, ((playerXP - lvlXP) / 1000) * 100);
  document.getElementById('xp-bar').style.width = pct + '%';
}

// ════════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════════
function showModal(i) {
  const m = MS[i];
  const unlocked = playerXP >= m.xp;
  document.getElementById('m-title').textContent = m.bld;
  document.getElementById('m-title').style.color = m.color;
  document.getElementById('m-chapter').textContent = m.ch || '';
  document.getElementById('m-chapter').style.color = unlocked ? m.color : '#334155';
  document.getElementById('m-icon').textContent = m.icon;
  document.getElementById('m-desc').textContent = m.desc;
  const storyEl = document.getElementById('m-story');
  if (unlocked && m.story) {
    storyEl.textContent = m.story;
    storyEl.style.borderColor = m.color + '30';
    storyEl.style.display = '';
  } else if (!unlocked && m.story) {
    storyEl.textContent = '🔒 أكمل المرحلة لفتح القصة...';
    storyEl.style.borderColor = '#1e293b';
    storyEl.style.display = '';
  } else {
    storyEl.style.display = 'none';
  }
  document.getElementById('m-xp').textContent = m.xp.toLocaleString();
  document.getElementById('m-reward').textContent = m.reward;
  const st = document.getElementById('m-status');
  if (unlocked) {
    st.innerHTML = `<span style="color:${m.color}">&#x2713; UNLOCKED — ${m.title}</span>`;
  } else {
    const rem = m.xp - playerXP;
    st.innerHTML = `<span style="color:#334155">&#x1F512; LOCKED — ${rem.toLocaleString()} XP left</span>`;
  }
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ════════════════════════════════════════════════════════════
//  CALC NODE
// ════════════════════════════════════════════════════════════
function calcNode() {
  let n = 0;
  for (let i = MS.length - 1; i >= 0; i--) { if (playerXP >= MS[i].xp) { n = i; break; } }
  return n;
}

// ════════════════════════════════════════════════════════════
//  FULL RENDER
// ════════════════════════════════════════════════════════════
function render(animate) {
  const prev = currentNode;
  currentNode = calcNode();
  updateHUD();
  updateMilestoneVisuals();
  revealRoad();
  clearFog();
  positionCar(currentNode, animate);
  // Always scroll to car so user sees their progress
  setTimeout(scrollToCar, animate ? 400 : 100);
}

// ════════════════════════════════════════════════════════════
//  MANUAL CAR MOVEMENT (Keyboard + D-Pad)
// ════════════════════════════════════════════════════════════
let carPathPos = 0;  // current position on path (0 → pathLen)
let carMoving = false;
let carMoveDir = 0;  // -1 = back (down), +1 = forward (up)
let carMoveInterval = null;
const CAR_SPEED = 8; // pixels per step

function initCarControls() {
  // Set initial car position from XP-based node
  const ridx = Math.min(MS_ROAD_IDX[currentNode], ROAD.length-1);
  carPathPos = (ridx / (ROAD.length - 1)) * pathLen;

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      e.preventDefault();
      startCarMove(1);
    } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
      e.preventDefault();
      startCarMove(-1);
    } else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      interactNearestMilestone();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (['ArrowUp','ArrowDown','w','W','s','S'].includes(e.key)) {
      stopCarMove();
    }
  });
}

function startCarMove(dir) {
  carMoveDir = dir;
  if (carMoveInterval) return;
  moveCarStep();
  carMoveInterval = setInterval(moveCarStep, 30);
}

function stopCarMove() {
  carMoveDir = 0;
  if (carMoveInterval) { clearInterval(carMoveInterval); carMoveInterval = null; }
}

function moveCarStep() {
  if (!pathEl || !pathLen) return;
  carPathPos = Math.max(0, Math.min(pathLen, carPathPos - carMoveDir * CAR_SPEED));

  const pt = pathEl.getPointAtLength(carPathPos);
  const pt2 = pathEl.getPointAtLength(Math.min(carPathPos + 2, pathLen));
  const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * (180/Math.PI) + 90;

  const car = document.getElementById('car-group');
  car.setAttribute('transform', `translate(${pt.x},${pt.y}) rotate(${angle})`);

  // Auto-scroll to keep car visible
  scrollToCarSmooth(pt.y);
}

function scrollToCarSmooth(carSvgY) {
  const svg = document.getElementById('city');
  const svgRect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const scale = svgRect.height / vb.height;
  const screenY = svgRect.top + window.scrollY + carSvgY * scale;
  const viewCenter = window.scrollY + window.innerHeight * 0.5;
  const diff = screenY - viewCenter;
  if (Math.abs(diff) > window.innerHeight * 0.35) {
    window.scrollBy({ top: diff * 0.3, behavior: 'auto' });
  }
}

function interactNearestMilestone() {
  if (!pathEl) return;
  const carPt = pathEl.getPointAtLength(carPathPos);
  let bestIdx = -1, bestDist = Infinity;
  MS.forEach((m, i) => {
    const ridx = Math.min(MS_ROAD_IDX[i], ROAD.length-1);
    const frac = ridx / (ROAD.length - 1);
    const mPt = pathEl.getPointAtLength(frac * pathLen);
    const d = Math.sqrt((carPt.x - mPt.x)**2 + (carPt.y - mPt.y)**2);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  });
  if (bestIdx >= 0 && bestDist < 80) {
    showModal(bestIdx);
  }
}

// D-Pad handlers
function mapDpad(dir) {
  if (dir === 'forward') startCarMove(1);
  else startCarMove(-1);
}
function mapDpadStop() { stopCarMove(); }
function mapDpadInteract() { interactNearestMilestone(); }

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
async function boot() {
  buildCity();

  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    supabaseClient = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
    const { data:{ session } } = await supabaseClient.auth.getSession();
    if (!session) { render(false); setTimeout(()=>scrollToCar(),300); initCarControls(); return; }
    accessToken = session.access_token;

    const res = await fetch('/api/me', { headers:{'Authorization':'Bearer '+accessToken} }).then(r=>r.json());
    const emp = res.data?.employee || res.employee || res;
    playerXP = emp.total_xp || 0;
    playerLevel = emp.level || 1;
    playerCoins = emp.syb_coins || 0;
    try {
      const stats = await fetch('/api/me/stats?days=365', { headers:{'Authorization':'Bearer '+accessToken} }).then(r=>r.json());
      playerDeals = stats.data?.stats?.deals_closed_total || stats.stats?.deals_closed_total || 0;
    } catch {}

    render(false);
    setTimeout(scrollToCar, 500);
    initCarControls();

    // Realtime
    supabaseClient.channel('map-xp')
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'employees', filter:`id=eq.${emp.id}` }, (p) => {
        const d = p.new;
        if (d.total_xp !== playerXP) {
          playerXP = d.total_xp||0; playerLevel = d.level||1; playerCoins = d.syb_coins||0;
          render(true);
        }
      }).subscribe();
  } catch(e) {
    console.error('Boot err:', e);
    render(false);
    setTimeout(scrollToCar, 300);
    initCarControls();
  }
}

boot();
</script>

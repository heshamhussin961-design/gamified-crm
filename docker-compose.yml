services:
  app:
    build: .
    image: alsaeb-crm:latest
    container_name: alsaeb-crm
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
